blueprint:
  name: SunEnergyXT 500 Series - Plugin Test Zero Feed-in
  description: >
    Test-only copy of the SunEnergyXT 500 / 500 Pro external-meter zero feed-in
    controller. Use this blueprint when validating a SunEnergyXT Home Assistant
    integration or entity mapping without replacing the production blueprint.
    It keeps the same control logic as the current meter-type setup blueprint:
    select the meter type, select the SunEnergyXT device, then the automation
    controls the system grid-port power setpoint and system max inverter power
    setpoint from external meter feedback.
  domain: automation
  homeassistant:
    min_version: "2024.6.0"
  source_url: https://github.com/yanqr213/500-blueprint-test/blob/main/blueprints/automation/sunenergyxt/sunenergyxt_plugin_test_zero_feed_in.yaml
  input:
    required_devices:
      name: SunEnergyXT setup
      icon: mdi:devices
      description: >
        Select the SunEnergyXT all-in-one device and the main user settings.
        The blueprint will auto-bind matching entities from this device and
        write the SOC limits to the device's own settings.
      input:
        aio_device:
          name: SunEnergyXT device
          description: >
            Select the SunEnergyXT 500 / 500 Pro device. The blueprint will
            auto-find the system grid-port power setpoint, system max inverter
            power setpoint, load-port power, grid-port power, PV total input
            power, system battery level, and system SOC limit entities from
            this device.
          selector:
            device:
              filter:
                - integration: sunenergyxt

        full_battery_mode:
          name: Full-battery behavior
          default: follow_load
          selector:
            select:
              options:
                - label: Follow load after full
                  value: follow_load
                - label: Follow PV after full
                  value: follow_pv

        gs_max_w:
          name: Maximum on-grid output power
          description: >
            Maximum allowed on-grid output power. Use 800 W for SunEnergyXT 500
            and 2400 W for SunEnergyXT 500 Pro unless a stricter local limit is
            required.
          default: 2400
          selector:
            number:
              min: 0
              max: 2400
              step: 1
              unit_of_measurement: W
              mode: box

        min_discharge_soc:
          name: System Min Discharge SOC
          description: >
            Sets the selected SunEnergyXT device's System Min Discharge SOC
            number entity. The automation also uses this value as the low-SOC
            control threshold.
          default: 10
          selector:
            number:
              min: 1
              max: 30
              step: 1
              unit_of_measurement: "%"
              mode: box

        max_charge_soc:
          name: System Max Charge SOC
          description: >
            Sets the selected SunEnergyXT device's System Max Charge SOC number
            entity. The automation also uses this value as the full-battery
            control threshold.
          default: 100
          selector:
            number:
              min: 70
              max: 100
              step: 1
              unit_of_measurement: "%"
              mode: box

        ac_couple_max_charge_power_w:
          name: AC-coupled maximum charge power
          default: 2400
          selector:
            number:
              min: 0
              max: 2400
              step: 1
              unit_of_measurement: W
              mode: box

    meter_setup:
      name: Meter setup
      icon: mdi:meter-electric
      description: >
        Select exactly one meter type. Home Assistant blueprints cannot
        dynamically hide fields based on this selection, so expand only the
        matching meter form below and leave the other forms blank.
      input:
        meter_power_source:
          name: Meter type
          description: >
            Choose the meter integration shape. Only fill the fields that
            match the selected type.
          selector:
            select:
              options:
                - label: Shelly Pro 3EM
                  value: shelly_total_power
                - label: EcoTracker
                  value: ecotracker_power
                - label: BitShake / Tasmota
                  value: bitshake_tasmota_power
                - label: Shelly 3EM
                  value: shelly_three_phase_sum
                - label: Custom meter
                  value: custom

    meter_pro3em_setup:
      name: Shelly Pro 3EM meter
      icon: mdi:meter-electric
      collapsed: true
      description: >
        Fill this section only when Meter type is Shelly Pro 3EM.
      input:
        pro3em_meter_device:
          name: Shelly Pro 3EM device
          description: >
            Select the Shelly Pro 3EM meter device.
          default: ""
          selector:
            device:
              entity:
                - domain: sensor

    meter_ecotracker_setup:
      name: EcoTracker meter
      icon: mdi:meter-electric
      collapsed: true
      description: >
        Fill this section only when Meter type is EcoTracker.
      input:
        ecotracker_meter_device:
          name: EcoTracker device
          description: >
            Select the EcoTracker meter device.
          default: ""
          selector:
            device:
              entity:
                - domain: sensor

    meter_bitshake_setup:
      name: BitShake / Tasmota meter
      icon: mdi:meter-electric
      collapsed: true
      description: >
        Fill this section only when Meter type is BitShake / Tasmota.
      input:
        bitshake_meter_device:
          name: BitShake / Tasmota device
          description: >
            Select the BitShake or Tasmota meter device.
          default: ""
          selector:
            device:
              entity:
                - domain: sensor

    meter_shelly3em_setup:
      name: Shelly 3EM meter
      icon: mdi:meter-electric
      collapsed: true
      description: >
        Fill this section only when Meter type is Shelly 3EM. Select the three
        phase devices; the blueprint will read each phase power from its device.
      input:
        meter_l1_device:
          name: Shelly 3EM phase A device
          description: >
            Select the HA device for phase A / L1.
          default: ""
          selector:
            device:
              entity:
                - domain: sensor

        meter_l2_device:
          name: Shelly 3EM phase B device
          description: >
            Select the HA device for phase B / L2.
          default: ""
          selector:
            device:
              entity:
                - domain: sensor

        meter_l3_device:
          name: Shelly 3EM phase C device
          description: >
            Select the HA device for phase C / L3.
          default: ""
          selector:
            device:
              entity:
                - domain: sensor

    meter_custom_setup:
      name: Custom meter
      icon: mdi:meter-electric
      collapsed: true
      description: >
        Fill this section only when Meter type is Custom meter. Custom meter
        does not need a meter device; select a formula and provide the matching
        entities.
      input:
        custom_meter_formula:
          name: Custom meter power formula
          description: >
            The blueprint applies this formula to the custom entities below.
          default: custom_signed_total_power
          selector:
            select:
              options:
                - label: Signed total power
                  value: custom_signed_total_power
                - label: L1 + L2 + L3
                  value: custom_three_phase_sum
                - label: Export - import
                  value: import_export_pair
                - label: L1-L3 export - import
                  value: custom_three_phase_import_export
                - label: Entity attribute
                  value: ecotracker_attribute_power

        meter_power_sensor:
          name: Custom total/current power entity
          description: >
            Use for Custom signed total power or Custom entity attribute.
          default: ""
          selector:
            entity:
              domain: sensor

        meter_power_attribute:
          name: Custom power attribute
          description: >
            Use only when Custom meter power formula is Entity attribute. The
            usual attribute name is power.
          default: power
          selector:
            text:

        meter_l1_power_sensor:
          name: Custom L1 / phase A power entity
          description: >
            Use for Custom formula L1 + L2 + L3.
          default: ""
          selector:
            entity:
              domain: sensor

        meter_l2_power_sensor:
          name: Custom L2 / phase B power entity
          description: >
            Use for Custom formula L1 + L2 + L3.
          default: ""
          selector:
            entity:
              domain: sensor

        meter_l3_power_sensor:
          name: Custom L3 / phase C power entity
          description: >
            Use for Custom formula L1 + L2 + L3.
          default: ""
          selector:
            entity:
              domain: sensor

        meter_import_power_sensor:
          name: Custom import power entity
          description: >
            Use for Custom formula Export - import.
          default: ""
          selector:
            entity:
              domain: sensor

        meter_export_power_sensor:
          name: Custom export power entity
          description: >
            Use for Custom formula Export - import.
          default: ""
          selector:
            entity:
              domain: sensor

        meter_l1_import_power_sensor:
          name: Custom L1 / phase A import power entity
          description: >
            Use for Custom formula L1-L3 export - import.
          default: ""
          selector:
            entity:
              domain: sensor

        meter_l2_import_power_sensor:
          name: Custom L2 / phase B import power entity
          description: >
            Use for Custom formula L1-L3 export - import.
          default: ""
          selector:
            entity:
              domain: sensor

        meter_l3_import_power_sensor:
          name: Custom L3 / phase C import power entity
          description: >
            Use for Custom formula L1-L3 export - import.
          default: ""
          selector:
            entity:
              domain: sensor

        meter_l1_export_power_sensor:
          name: Custom L1 / phase A export power entity
          description: >
            Use for Custom formula L1-L3 export - import.
          default: ""
          selector:
            entity:
              domain: sensor

        meter_l2_export_power_sensor:
          name: Custom L2 / phase B export power entity
          description: >
            Use for Custom formula L1-L3 export - import.
          default: ""
          selector:
            entity:
              domain: sensor

        meter_l3_export_power_sensor:
          name: Custom L3 / phase C export power entity
          description: >
            Use for Custom formula L1-L3 export - import.
          default: ""
          selector:
            entity:
              domain: sensor

    advanced_entity_overrides:
      name: Advanced entity overrides
      icon: mdi:form-select
      collapsed: true
      description: >
        Leave these blank for automatic device-based binding. Expand only if the
        selected device exposes unusual entity names and the auto-bind result is
        wrong.
      input:
        gs_number:
          name: Override System Grid Port Power Setpoint entity
          default: ""
          selector:
            entity:
              domain: number

        is_number:
          name: Override System Max Inverter Power Setpoint entity
          default: ""
          selector:
            entity:
              domain: number

        load_power_sensor:
          name: Override load-port power sensor
          default: ""
          selector:
            entity:
              domain: sensor

        grid_port_power_sensor:
          name: Override grid-port power sensor
          default: ""
          selector:
            entity:
              domain: sensor

        pv_power_sensor:
          name: Override PV power sensor
          default: ""
          selector:
            entity:
              domain: sensor

        soc_sensor:
          name: Override SOC sensor
          default: ""
          selector:
            entity:
              domain: sensor

        min_discharge_soc_number:
          name: Override min-discharge SOC number
          default: ""
          selector:
            entity:
              domain: number

        max_charge_soc_number:
          name: Override max-charge SOC number
          default: ""
          selector:
            entity:
              domain: number

    advanced_meter_settings:
      name: Advanced meter sign and unit settings
      icon: mdi:meter-electric
      collapsed: true
      input:
        meter_sign_mode:
          name: Meter sign convention
          description: >
            Auto uses the selected meter type default. Use an explicit override
            if your CT direction, script, or template reports the opposite
            sign.
          default: auto_from_preset
          selector:
            select:
              options:
                - label: Auto from selected meter type
                  value: auto_from_preset
                - label: Export/feed-in is positive
                  value: export_positive
                - label: Import/grid consumption is positive
                  value: import_positive

        meter_power_multiplier:
          name: External meter power multiplier
          description: >
            Use 1 when the entity is already W. Use 1000 when the entity is kW.
          default: 1
          selector:
            number:
              min: 0.001
              max: 1000
              step: 0.001
              mode: box

    advanced_control_settings:
      name: Advanced control settings
      icon: mdi:cog-outline
      collapsed: true
      input:
        target_grid_power_w:
          name: Target grid power
          description: >
            Zero feed-in uses 0 W. Positive values intentionally keep a small
            export; negative values intentionally keep a small import.
          default: 0
          selector:
            number:
              min: -200
              max: 200
              step: 1
              unit_of_measurement: W
              mode: box

        gs_min_w:
          name: System Grid Port Power Setpoint lower limit
          description: >
            Minimum allowed system grid-port power setpoint. Negative values
            allow grid import / charging to absorb surplus power.
          default: -2400
          selector:
            number:
              min: -2400
              max: 0
              step: 1
              unit_of_measurement: W
              mode: box

        gs_resolution_w:
          name: System Grid Port Power Setpoint write resolution
          default: 1
          selector:
            number:
              min: 1
              max: 50
              step: 1
              unit_of_measurement: W
              mode: box

        gain_percent:
          name: Correction gain
          default: 100
          selector:
            number:
              min: 20
              max: 150
              step: 5
              unit_of_measurement: "%"
              mode: slider

        small_error_w:
          name: Small-error threshold
          default: 30
          selector:
            number:
              min: 1
              max: 300
              step: 1
              unit_of_measurement: W
              mode: box

        large_error_w:
          name: Large-error threshold
          default: 150
          selector:
            number:
              min: 10
              max: 1000
              step: 10
              unit_of_measurement: W
              mode: box

        slow_interval_s:
          name: Slow write interval
          default: 7
          selector:
            number:
              min: 1
              max: 120
              step: 0.5
              unit_of_measurement: s
              mode: box

        medium_interval_s:
          name: Medium write interval
          default: 2.5
          selector:
            number:
              min: 0.5
              max: 60
              step: 0.5
              unit_of_measurement: s
              mode: box

        fast_interval_s:
          name: Fast write interval
          default: 1
          selector:
            number:
              min: 1
              max: 20
              step: 1
              unit_of_measurement: s
              mode: box

        gs_feedback_settle_s:
          name: Control feedback settle time
          description: >
            Minimum time after a system grid-port power setpoint or system max
            inverter power setpoint write before the next control write. The
            automation also waits for fresh grid-port power and meter samples
            after the last control change. The default matches observed
            SunEnergyXT feedback latency and reduces hunting when an external
            device changes output.
          default: 5
          selector:
            number:
              min: 1
              max: 30
              step: 1
              unit_of_measurement: s
              mode: box

        small_max_step_w:
          name: Small-error max adjustment
          default: 20
          selector:
            number:
              min: 1
              max: 300
              step: 1
              unit_of_measurement: W
              mode: box

        medium_max_step_w:
          name: Medium-error max adjustment
          default: 120
          selector:
            number:
              min: 10
              max: 1000
              step: 10
              unit_of_measurement: W
              mode: box

        fast_max_step_w:
          name: Large-error max adjustment
          default: 450
          selector:
            number:
              min: 50
              max: 2400
              step: 10
              unit_of_measurement: W
              mode: box

        max_meter_age_s:
          name: Maximum meter age
          description: >
            Maximum age for meter and device readings. The default allows
            meters such as Shelly Pro 3EM to leave idle 0 W phase sensors
            unchanged without blocking control.
          default: 30
          selector:
            number:
              min: 2
              max: 300
              step: 1
              unit_of_measurement: s
              mode: box

        is_resolution_w:
          name: System Max Inverter Power Setpoint write resolution
          default: 10
          selector:
            number:
              min: 1
              max: 100
              step: 1
              unit_of_measurement: W
              mode: box

        diagnostic_log_level:
          name: Diagnostic log level
          description: >
            Off writes no diagnostic logs. Events logs SOC hold helper
            transitions. Write adds setpoint write logs. Decision adds periodic
            control decision logs. Debug writes decision logs every 5 seconds.
          default: off
          selector:
            select:
              options:
                - label: "Off"
                  value: "off"
                - label: "Events"
                  value: "events"
                - label: "Write events"
                  value: "write"
                - label: "Decisions"
                  value: "decision"
                - label: "Debug"
                  value: "debug"

        diagnostic_log_interval_s:
          name: Diagnostic decision log interval
          description: >
            Minimum interval for periodic Decisions logs. Debug decision logs
            use a fixed 5 s interval. Event and write logs are emitted only when
            the related action actually happens.
          default: 60
          selector:
            number:
              min: 10
              max: 3600
              step: 10
              unit_of_measurement: s
              mode: box

        full_charge_hold_helper:
          name: Optional full-charge hold helper
          description: >
            Optional. Leave blank unless you want the automation to remember
            full-charge hold state across restarts. Without this helper, the
            automation derives full-charge hold directly from current SOC.
          default: ""
          selector:
            entity:
              domain: input_boolean

        low_discharge_hold_helper:
          name: Optional low-SOC hold helper
          description: >
            Optional. Leave blank unless you want the automation to remember
            low-SOC hold state across restarts. Without this helper, the
            automation derives low-SOC hold directly from current SOC.
          default: ""
          selector:
            entity:
              domain: input_boolean

mode: single
max_exceeded: silent

trigger:
  - platform: time_pattern
    seconds: "/1"

variables:
  aio_device: !input aio_device
  pro3em_meter_device: !input pro3em_meter_device
  ecotracker_meter_device: !input ecotracker_meter_device
  bitshake_meter_device: !input bitshake_meter_device
  meter_l1_device: !input meter_l1_device
  meter_l2_device: !input meter_l2_device
  meter_l3_device: !input meter_l3_device
  meter_power_source: !input meter_power_source
  custom_meter_formula: !input custom_meter_formula
  meter_entity_override: !input meter_power_sensor
  meter_power_attribute: !input meter_power_attribute
  meter_l1_entity_override: !input meter_l1_power_sensor
  meter_l2_entity_override: !input meter_l2_power_sensor
  meter_l3_entity_override: !input meter_l3_power_sensor
  meter_import_entity_override: !input meter_import_power_sensor
  meter_export_entity_override: !input meter_export_power_sensor
  meter_l1_import_entity_override: !input meter_l1_import_power_sensor
  meter_l2_import_entity_override: !input meter_l2_import_power_sensor
  meter_l3_import_entity_override: !input meter_l3_import_power_sensor
  meter_l1_export_entity_override: !input meter_l1_export_power_sensor
  meter_l2_export_entity_override: !input meter_l2_export_power_sensor
  meter_l3_export_entity_override: !input meter_l3_export_power_sensor
  meter_sign_mode: !input meter_sign_mode
  meter_power_multiplier: !input meter_power_multiplier
  external_meter_device: >-
    {% set source = meter_power_source | trim %}
    {% if source == 'shelly_total_power' %}
      {{ pro3em_meter_device | string | trim }}
    {% elif source == 'ecotracker_power' %}
      {{ ecotracker_meter_device | string | trim }}
    {% elif source == 'bitshake_tasmota_power' %}
      {{ bitshake_meter_device | string | trim }}
    {% else %}
      {{ '' }}
    {% endif %}
  effective_meter_power_source: >-
    {% if meter_power_source | trim == 'custom' %}
      {{ custom_meter_formula | trim }}
    {% else %}
      {{ meter_power_source | trim }}
    {% endif %}
  gs_entity_override: !input gs_number
  is_entity_override: !input is_number
  load_entity_override: !input load_power_sensor
  gp_entity_override: !input grid_port_power_sensor
  pv_entity_override: !input pv_power_sensor
  soc_entity_override: !input soc_sensor
  min_soc_entity_override: !input min_discharge_soc_number
  max_soc_entity_override: !input max_charge_soc_number
  full_hold_entity: !input full_charge_hold_helper
  low_hold_entity: !input low_discharge_hold_helper
  full_battery_mode: !input full_battery_mode
  target_grid_power_w: !input target_grid_power_w
  gs_min_w: !input gs_min_w
  gs_max_w: !input gs_max_w
  gs_resolution_w: !input gs_resolution_w
  gain_percent: !input gain_percent
  small_error_w: !input small_error_w
  large_error_w: !input large_error_w
  slow_interval_s: !input slow_interval_s
  medium_interval_s: !input medium_interval_s
  fast_interval_s: !input fast_interval_s
  gs_feedback_settle_s: !input gs_feedback_settle_s
  small_max_step_w: !input small_max_step_w
  medium_max_step_w: !input medium_max_step_w
  fast_max_step_w: !input fast_max_step_w
  max_meter_age_s: !input max_meter_age_s
  min_discharge_soc: !input min_discharge_soc
  max_charge_soc: !input max_charge_soc
  ac_couple_max_charge_power_w: !input ac_couple_max_charge_power_w
  is_resolution_w: !input is_resolution_w
  diagnostic_log_level: !input diagnostic_log_level
  diagnostic_log_interval_s: !input diagnostic_log_interval_s
  gs_entity: >-
    {% set override = gs_entity_override | string %}
    {% if override | length > 0 %}
      {{ override | trim }}
    {% else %}
      {% set ns = namespace(entity='') %}
      {% for entity in device_entities(aio_device) if ns.entity == '' and entity.startswith('number.') %}
        {% set name = (state_attr(entity, 'friendly_name') or entity) | lower %}
        {% set eid = entity | lower %}
        {% if eid.endswith('_gs') or 'grid port power setpoint' in name or '市电口功率设定' in name or ('netzanschluss' in name and 'sollwert' in name) %}
          {% set ns.entity = entity %}
        {% endif %}
      {% endfor %}
      {{ ns.entity | trim }}
    {% endif %}
  is_entity: >-
    {% set override = is_entity_override | string %}
    {% if override | length > 0 %}
      {{ override | trim }}
    {% else %}
      {% set ns = namespace(entity='') %}
      {% for entity in device_entities(aio_device) if ns.entity == '' and entity.startswith('number.') %}
        {% set name = (state_attr(entity, 'friendly_name') or entity) | lower %}
        {% set eid = entity | lower %}
        {% if eid.endswith('_is') or 'max inverter power setpoint' in name or '最大逆变功率设定' in name or 'wechselrichterleistung' in name %}
          {% set ns.entity = entity %}
        {% endif %}
      {% endfor %}
      {{ ns.entity | trim }}
    {% endif %}
  load_entity: >-
    {% set override = load_entity_override | string %}
    {% if override | length > 0 %}
      {{ override | trim }}
    {% else %}
      {% set ns = namespace(entity='') %}
      {% for entity in device_entities(aio_device) if ns.entity == '' and entity.startswith('sensor.') %}
        {% set name = (state_attr(entity, 'friendly_name') or entity) | lower %}
        {% set eid = entity | lower %}
        {% if eid.endswith('_lp') or 'load port power' in name or '负载口功率' in name or 'lastanschluss' in name %}
          {% set ns.entity = entity %}
        {% endif %}
      {% endfor %}
      {{ ns.entity | trim }}
    {% endif %}
  gp_entity: >-
    {% set override = gp_entity_override | string %}
    {% if override | length > 0 %}
      {{ override | trim }}
    {% else %}
      {% set ns = namespace(entity='') %}
      {% for entity in device_entities(aio_device) if ns.entity == '' and entity.startswith('sensor.') %}
        {% set name = (state_attr(entity, 'friendly_name') or entity) | lower %}
        {% set eid = entity | lower %}
        {% if eid.endswith('_gp') or 'grid port power' in name or '并网口功率' in name or ('netzanschluss' in name and 'leistung' in name) %}
          {% set ns.entity = entity %}
        {% endif %}
      {% endfor %}
      {{ ns.entity | trim }}
    {% endif %}
  pv_entity: >-
    {% set override = pv_entity_override | string %}
    {% if override | length > 0 %}
      {{ override | trim }}
    {% else %}
      {% set ns = namespace(entity='') %}
      {% for entity in device_entities(aio_device) if ns.entity == '' and entity.startswith('sensor.') %}
        {% set name = (state_attr(entity, 'friendly_name') or entity) | lower %}
        {% set eid = entity | lower %}
        {% if eid.endswith('_pv') or 'pv total input power' in name or 'pv总输入功率' in name or 'pv-gesamteingangsleistung' in name %}
          {% set ns.entity = entity %}
        {% endif %}
      {% endfor %}
      {{ ns.entity | trim }}
    {% endif %}
  soc_entity: >-
    {% set override = soc_entity_override | string %}
    {% if override | length > 0 %}
      {{ override | trim }}
    {% else %}
      {% set ns = namespace(entity='') %}
      {% for entity in device_entities(aio_device) if ns.entity == '' and entity.startswith('sensor.') %}
        {% set name = (state_attr(entity, 'friendly_name') or entity) | lower %}
        {% set eid = entity | lower %}
